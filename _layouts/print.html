<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} — خط زمانی کامل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Vazirmatn', sans-serif;
      direction: rtl;
      background: #fff;
      color: #1a1a2e;
      font-size: 14px;
      line-height: 1.7;
    }

    /* Print controls — hidden when printing */
    .print-controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: space-between;
    }

    .print-controls span {
      font-size: 0.9rem;
      color: #a0a0c0;
    }

    .print-controls .btn-group {
      display: flex;
      gap: 0.75rem;
    }

    .btn-print {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-print:hover { opacity: 0.85; }

    .btn-back {
      background: transparent;
      color: #a0a0c0;
      border: 1px solid #2a2a4a;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-back:hover { color: #fff; border-color: #fff; }

    /* Document */
    .doc {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .doc-header {
      text-align: center;
      padding-bottom: 2rem;
      border-bottom: 3px solid #e94560;
      margin-bottom: 2rem;
    }

    .doc-header .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }

    .doc-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .doc-header .subtitle {
      font-size: 0.9rem;
      color: #e94560;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .doc-header .description {
      font-size: 0.9rem;
      color: #555;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .doc-header .generated {
      font-size: 0.8rem;
      color: #999;
      margin-top: 0.75rem;
    }

    /* Era sections */
    .era-section {
      margin-bottom: 2.5rem;
    }

    .era-heading {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e94560;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #e94560;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .era-heading .era-range {
      font-size: 0.8rem;
      font-weight: 400;
      color: #888;
    }

    /* Event entries */
    .event-entry {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding: 1rem;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    .event-entry:last-child { margin-bottom: 0; }

    .event-side {
      flex-shrink: 0;
      text-align: center;
      width: 80px;
    }

    .year-badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      white-space: nowrap;
      margin-bottom: 0.3rem;
    }

    .category-tag {
      display: block;
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      margin-top: 0.3rem;
      text-align: center;
    }

    .cat-coup     { background: #ffe0e6; color: #c0004a; }
    .cat-sanction { background: #dff0ff; color: #0060a0; }
    .cat-military { background: #fff0e0; color: #b05000; }
    .cat-cyber    { background: #e0fff0; color: #007050; }
    .cat-diplo    { background: #fffce0; color: #806000; }
    .cat-intel    { background: #f0e0ff; color: #6000a0; }

    .event-body h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.35rem;
      line-height: 1.4;
    }

    .event-body p {
      font-size: 0.9rem;
      color: #444;
      line-height: 1.75;
    }

    .event-url {
      font-size: 0.75rem;
      color: #999;
      margin-top: 0.3rem;
    }

    /* Citations */
    .citations {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 2px solid #e8e8e8;
      page-break-before: avoid;
    }

    .citations h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .citations ul {
      list-style: none;
      padding: 0;
    }

    .citations li {
      font-size: 0.82rem;
      color: #666;
      padding: 0.3rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .citations a {
      color: #e94560;
      word-break: break-all;
    }

    /* Print media */
    @media print {
      .print-controls { display: none !important; }

      body {
        font-size: 11pt;
        background: #fff;
        color: #000;
      }

      .doc {
        max-width: 100%;
        padding: 0;
      }

      .doc-header {
        padding-bottom: 1rem;
        margin-bottom: 1rem;
      }

      .event-entry {
        page-break-inside: avoid;
        break-inside: avoid;
        border: 0.5pt solid #ccc;
      }

      .era-section {
        page-break-inside: auto;
      }

      .era-heading {
        page-break-after: avoid;
      }

      a[href]::after {
        content: " (" attr(href) ")";
        font-size: 0.7em;
        color: #888;
      }

      .event-url::after {
        content: none;
      }
    }
  </style>
</head>
<body>

<div class="print-controls">
  <a href="/" class="btn-back">← بازگشت به سایت</a>
  <span>خط زمانی کامل — آماده چاپ و ذخیره به PDF</span>
  <div class="btn-group">
    <button class="btn-print" onclick="window.print()">🖨 ذخیره / چاپ PDF</button>
  </div>
</div>

{{ content }}

</body>
</html>
